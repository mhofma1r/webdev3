volumes:
  mariadb:
services:
  web:
    build: .
    volumes:
      - .composer:/root/.composer
      - .log:/var/log
      - ../php:/var/www/html
    working_dir: /var/www/html
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - PHP_INI_DIR=/usr/local/etc/php/conf.d/
    ports:
      - 80:80
      - '22:22'
    links:
      - mariadb
  mariadb:
    image: mariadb:latest
    restart: on-failure
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./mariadb_data:/var/lib/mysql
      - ./db_seed:/tmp/db_seed/
    ports:
      - '33060:3306'
    environment:
      MYSQL_ROOT_PASSWORD: "mewj8mtn"
      MYSQL_DATABASE: "laravel"
      MYSQL_USER: "remote"
      MYSQL_PASSWORD: "782kEW17"
  phpmyadmin:
    depends_on:
      - mariadb
    image: phpmyadmin/phpmyadmin
    restart: on-failure
    ports:
      - '8888:80'
    links:
      - mariadb
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: mewj8mtn
  deployer:
    build:
      context: deployer
      dockerfile: Dockerfile
    volumes:
      - ../php:/var/www/html
      - ./deploy.d:/var/www/html/deploy.d
      - ./.ssh:/root/.ssh/
  mcp:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    environment:
      HOST: 0.0.0.0
      CLIENT_PORT: 6274
      SERVER_PORT: 6277
    ports:
      - "127.0.0.1:6274:6274"
      - "127.0.0.1:6277:6277"
    depends_on:
      - web

